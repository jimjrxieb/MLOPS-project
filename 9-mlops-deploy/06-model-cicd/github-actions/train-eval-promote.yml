name: Train → Eval → Promote

on:
  workflow_run:
    workflows: ["Validate Training Data"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual training run'

jobs:
  train:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, gpu]
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install unsloth torch transformers datasets peft
          pip install jsonlines pandas scikit-learn

      - name: Run ETL
        run: python3 1-FineTuning-Pipeline/etl_pipeline.py

      - name: Chunk data
        run: python3 1-FineTuning-Pipeline/chunk_data.py

      - name: Train (LoRA fine-tune)
        run: python3 1-FineTuning-Pipeline/train_v11.py

      - name: Merge LoRA adapters
        run: python3 1-FineTuning-Pipeline/merge_model.py

      - name: Run evaluation
        id: eval
        run: |
          python3 1-FineTuning-Pipeline/eval_bridge.py --output eval-results.json
          SCORE=$(python3 -c "import json; r=json.load(open('eval-results.json')); print(r.get('weighted_score', 0))")
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Weighted eval score: ${SCORE}%"

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.json

      - name: Promote model
        if: ${{ steps.eval.outputs.score >= 60 }}
        run: |
          python3 1-FineTuning-Pipeline/convert_gguf.py
          echo "Model promoted with score: ${{ steps.eval.outputs.score }}%"

      - name: Open issue on failure
        if: ${{ steps.eval.outputs.score < 60 }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Model eval failed: ${{ steps.eval.outputs.score }}%`,
              body: `## Eval Failed\n\nWeighted score: **${{ steps.eval.outputs.score }}%** (threshold: 60%)\n\n### Next Steps\n1. Run \`feedback_loop.py\` to identify weak categories\n2. Generate targeted training data\n3. Re-trigger training\n\nTrigger: ${{ github.event_name == 'workflow_dispatch' && inputs.reason || 'Automated after data validation' }}`,
              labels: ['mlops', 'eval-failure']
            })
