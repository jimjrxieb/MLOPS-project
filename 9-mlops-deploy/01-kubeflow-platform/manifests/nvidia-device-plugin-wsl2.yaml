apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.14.5
          env:
            - name: LD_LIBRARY_PATH
              value: /usr/lib/wsl/lib
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: wsl-lib
              mountPath: /usr/lib/wsl/lib
              readOnly: true
            - name: wsl-drivers
              mountPath: /usr/lib/wsl/drivers
              readOnly: true
            - name: dev-dxg
              mountPath: /dev/dxg
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: wsl-lib
          hostPath:
            path: /usr/lib/wsl/lib
        - name: wsl-drivers
          hostPath:
            path: /usr/lib/wsl/drivers
        - name: dev-dxg
          hostPath:
            path: /dev/dxg
