# KServe (standalone) Helm values
# Deployed by: tools/deploy-kserve.sh
# Docs: https://kserve.github.io/website/

# Mode: Serverless (Knative) or RawDeployment
# Serverless = scale-to-zero via Knative (good for predictive ML)
# RawDeployment = standard K8s Deployment (better for LLMs — no cold start)
defaultDeploymentMode: RawDeployment

# Ingress
ingress:
  ingressClassName: ""  # Use cluster default
  # For AWS ALB:
  # ingressClassName: alb

# Controller
controller:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Default model serving runtimes
servingRuntimes:
  # vLLM — production LLM serving (OpenAI-compatible API)
  vllm:
    enabled: true
  # TGI — HuggingFace Text Generation Inference
  tgi:
    enabled: false
  # Triton — NVIDIA multi-framework
  triton:
    enabled: false
  # sklearn/xgboost — traditional ML
  sklearn:
    enabled: false
  xgboost:
    enabled: false

# Autoscaling — use KEDA for LLM workloads (not Knative)
# KEDA scales on custom metrics: vLLM queue depth, GPU util, request count
autoscaler: keda

# Security defaults
securityContext:
  runAsNonRoot: true
