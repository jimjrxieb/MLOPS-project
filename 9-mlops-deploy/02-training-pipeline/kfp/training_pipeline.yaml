# PIPELINE DEFINITION
# Name: model-training-pipeline
# Description: Full training lifecycle: validate → ETL → train → merge → convert → eval → promote
# Inputs:
#    base_model: str [Default: 'unsloth/Llama-3.2-3B-Instruct']
#    batch_size: int [Default: 4.0]
#    chunk_size: int [Default: 10000.0]
#    data_path: str [Default: 's3://ml-artifacts/training-data/corpus.jsonl']
#    epochs: int [Default: 2.0]
#    eval_holdout_pct: float [Default: 0.05]
#    learning_rate: float [Default: 0.0002]
#    lora_alpha: int [Default: 128.0]
#    lora_r: int [Default: 64.0]
#    max_seq_length: int [Default: 4096.0]
#    model_name: str [Default: 'katie-3b']
#    model_version: str [Default: 'v2.0']
#    promotion_threshold: float [Default: 60.0]
#    quantization: str [Default: 'q4_k_m']
#    s3_model_store: str [Default: 's3://ml-artifacts/models']
components:
  comp-condition-1:
    dag:
      tasks:
        condition-2:
          componentRef:
            name: comp-condition-2
          dependentTasks:
          - convert-gguf
          - evaluate-model
          inputs:
            artifacts:
              pipelinechannel--convert-gguf-gguf_model:
                taskOutputArtifact:
                  outputArtifactKey: gguf_model
                  producerTask: convert-gguf
            parameters:
              pipelinechannel--evaluate-model-Output:
                taskOutputParameter:
                  outputParameterKey: Output
                  producerTask: evaluate-model
              pipelinechannel--model_name:
                componentInputParameter: pipelinechannel--model_name
              pipelinechannel--model_version:
                componentInputParameter: pipelinechannel--model_version
              pipelinechannel--s3_model_store:
                componentInputParameter: pipelinechannel--s3_model_store
              pipelinechannel--validate-data-Output:
                componentInputParameter: pipelinechannel--validate-data-Output
          taskInfo:
            name: condition-2
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--evaluate-model-Output']
              == true
        convert-gguf:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-convert-gguf
          dependentTasks:
          - merge-lora
          inputs:
            artifacts:
              merged_model:
                taskOutputArtifact:
                  outputArtifactKey: merged_model
                  producerTask: merge-lora
            parameters:
              quantization:
                componentInputParameter: pipelinechannel--quantization
          taskInfo:
            name: convert-gguf
        etl-and-chunk:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-etl-and-chunk
          inputs:
            parameters:
              chunk_size:
                componentInputParameter: pipelinechannel--chunk_size
              data_path:
                componentInputParameter: pipelinechannel--data_path
              eval_holdout_pct:
                componentInputParameter: pipelinechannel--eval_holdout_pct
          taskInfo:
            name: etl-and-chunk
        evaluate-model:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-evaluate-model
          dependentTasks:
          - convert-gguf
          - etl-and-chunk
          inputs:
            artifacts:
              eval_data:
                taskOutputArtifact:
                  outputArtifactKey: eval_holdout
                  producerTask: etl-and-chunk
              model_path:
                taskOutputArtifact:
                  outputArtifactKey: gguf_model
                  producerTask: convert-gguf
            parameters:
              promotion_threshold:
                componentInputParameter: pipelinechannel--promotion_threshold
          taskInfo:
            name: evaluate-model
        merge-lora:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-merge-lora
          dependentTasks:
          - train-lora
          inputs:
            artifacts:
              lora_model:
                taskOutputArtifact:
                  outputArtifactKey: trained_model
                  producerTask: train-lora
            parameters:
              base_model:
                componentInputParameter: pipelinechannel--base_model
          taskInfo:
            name: merge-lora
        train-lora:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-train-lora
          dependentTasks:
          - etl-and-chunk
          inputs:
            artifacts:
              training_data:
                taskOutputArtifact:
                  outputArtifactKey: chunked_data
                  producerTask: etl-and-chunk
            parameters:
              base_model:
                componentInputParameter: pipelinechannel--base_model
              batch_size:
                componentInputParameter: pipelinechannel--batch_size
              epochs:
                componentInputParameter: pipelinechannel--epochs
              learning_rate:
                componentInputParameter: pipelinechannel--learning_rate
              lora_alpha:
                componentInputParameter: pipelinechannel--lora_alpha
              lora_r:
                componentInputParameter: pipelinechannel--lora_r
              max_seq_length:
                componentInputParameter: pipelinechannel--max_seq_length
          taskInfo:
            name: train-lora
    inputDefinitions:
      parameters:
        pipelinechannel--base_model:
          parameterType: STRING
        pipelinechannel--batch_size:
          parameterType: NUMBER_INTEGER
        pipelinechannel--chunk_size:
          parameterType: NUMBER_INTEGER
        pipelinechannel--data_path:
          parameterType: STRING
        pipelinechannel--epochs:
          parameterType: NUMBER_INTEGER
        pipelinechannel--eval_holdout_pct:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--learning_rate:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--lora_alpha:
          parameterType: NUMBER_INTEGER
        pipelinechannel--lora_r:
          parameterType: NUMBER_INTEGER
        pipelinechannel--max_seq_length:
          parameterType: NUMBER_INTEGER
        pipelinechannel--model_name:
          parameterType: STRING
        pipelinechannel--model_version:
          parameterType: STRING
        pipelinechannel--promotion_threshold:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--quantization:
          parameterType: STRING
        pipelinechannel--s3_model_store:
          parameterType: STRING
        pipelinechannel--validate-data-Output:
          parameterType: BOOLEAN
  comp-condition-2:
    dag:
      tasks:
        register-model:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-register-model
          inputs:
            artifacts:
              model:
                componentInputArtifact: pipelinechannel--convert-gguf-gguf_model
            parameters:
              model_name:
                componentInputParameter: pipelinechannel--model_name
              model_version:
                componentInputParameter: pipelinechannel--model_version
              s3_destination:
                componentInputParameter: pipelinechannel--s3_model_store
          taskInfo:
            name: register-model
    inputDefinitions:
      artifacts:
        pipelinechannel--convert-gguf-gguf_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--evaluate-model-Output:
          parameterType: BOOLEAN
        pipelinechannel--model_name:
          parameterType: STRING
        pipelinechannel--model_version:
          parameterType: STRING
        pipelinechannel--s3_model_store:
          parameterType: STRING
        pipelinechannel--validate-data-Output:
          parameterType: BOOLEAN
  comp-convert-gguf:
    executorLabel: exec-convert-gguf
    inputDefinitions:
      artifacts:
        merged_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        quantization:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        gguf_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-etl-and-chunk:
    executorLabel: exec-etl-and-chunk
    inputDefinitions:
      parameters:
        chunk_size:
          parameterType: NUMBER_INTEGER
        data_path:
          parameterType: STRING
        eval_holdout_pct:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        chunked_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        eval_holdout:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      artifacts:
        eval_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        model_path:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        promotion_threshold:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        eval_results:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-merge-lora:
    executorLabel: exec-merge-lora
    inputDefinitions:
      artifacts:
        lora_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        base_model:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        merged_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-register-model:
    executorLabel: exec-register-model
    inputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        model_name:
          parameterType: STRING
        model_version:
          parameterType: STRING
        s3_destination:
          parameterType: STRING
  comp-train-lora:
    executorLabel: exec-train-lora
    inputDefinitions:
      artifacts:
        training_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        base_model:
          parameterType: STRING
        batch_size:
          parameterType: NUMBER_INTEGER
        epochs:
          parameterType: NUMBER_INTEGER
        learning_rate:
          parameterType: NUMBER_DOUBLE
        lora_alpha:
          parameterType: NUMBER_INTEGER
        lora_r:
          parameterType: NUMBER_INTEGER
        max_seq_length:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        trained_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        training_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
  comp-validate-data:
    executorLabel: exec-validate-data
    inputDefinitions:
      parameters:
        data_path:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        validation_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: BOOLEAN
deploymentSpec:
  executors:
    exec-convert-gguf:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - convert_gguf
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-cpp-python'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef convert_gguf(\n    merged_model: Input[Model],\n    quantization:\
          \ str,\n    gguf_model: Output[Model],\n):\n    \"\"\"Step 5: Convert merged\
          \ model to GGUF for vLLM/Ollama serving.\"\"\"\n    import subprocess\n\n\
          \    subprocess.run([\n        \"python3\", \"-m\", \"llama_cpp.convert\"\
          ,\n        \"--outfile\", f\"{gguf_model.path}/model.gguf\",\n        \"\
          --outtype\", quantization,\n        merged_model.path,\n    ], check=True)\n\
          \n"
        image: python:3.11-slim
    exec-etl-and-chunk:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - etl_and_chunk
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'jsonlines' 'pandas'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef etl_and_chunk(\n    data_path: str,\n    chunk_size: int,\n \
          \   eval_holdout_pct: float,\n    chunked_data: Output[Dataset],\n    eval_holdout:\
          \ Output[Dataset],\n):\n    \"\"\"Steps 1-2: ETL (normalize to ChatML, dedup)\
          \ then chunk.\"\"\"\n    import json\n    import jsonlines\n    import hashlib\n\
          \    import os\n    import random\n\n    examples = []\n    seen_hashes\
          \ = set()\n\n    with jsonlines.open(data_path) as reader:\n        for\
          \ example in reader:\n            # Dedup by content hash\n            content\
          \ = json.dumps(example, sort_keys=True)\n            h = hashlib.sha256(content.encode()).hexdigest()\n\
          \            if h in seen_hashes:\n                continue\n          \
          \  seen_hashes.add(h)\n            examples.append(example)\n\n    random.seed(42)\n\
          \    random.shuffle(examples)\n\n    # Split eval holdout\n    holdout_count\
          \ = int(len(examples) * eval_holdout_pct)\n    eval_examples = examples[:holdout_count]\n\
          \    train_examples = examples[holdout_count:]\n\n    # Write chunks (KFP\
          \ handles artifact storage)\n    with jsonlines.open(chunked_data.path,\
          \ mode=\"w\") as writer:\n        for ex in train_examples[:chunk_size]:\n\
          \            writer.write(ex)\n\n    with jsonlines.open(eval_holdout.path,\
          \ mode=\"w\") as writer:\n        for ex in eval_examples:\n           \
          \ writer.write(ex)\n\n"
        image: python:3.11-slim
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'jsonlines' 'requests'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    model_path: Input[Model],\n    eval_data:\
          \ Input[Dataset],\n    promotion_threshold: float,\n    eval_results: Output[Metrics],\n\
          ) -> bool:\n    \"\"\"Step 6: Run benchmark evaluation. Returns True if\
          \ model passes promotion gate.\"\"\"\n    import json\n    import jsonlines\n\
          \n    # Eval logic \u2014 run model against benchmark questions\n    # In\
          \ production this calls the eval_bridge.py or runs inference directly\n\
          \    results = {\"weighted_score\": 0.0, \"categories\": {}}\n\n    # Placeholder\
          \ \u2014 real eval loads model and runs inference\n    # The actual eval_bridge.py\
          \ handles this\n    eval_results.log_metric(\"weighted_score\", results[\"\
          weighted_score\"])\n    eval_results.log_metric(\"promotion_threshold\"\
          , promotion_threshold)\n\n    promoted = results[\"weighted_score\"] >=\
          \ promotion_threshold\n    eval_results.log_metric(\"promoted\", 1.0 if\
          \ promoted else 0.0)\n    return promoted\n\n"
        image: python:3.11-slim
    exec-merge-lora:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - merge_lora
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'peft' 'transformers'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef merge_lora(\n    lora_model: Input[Model],\n    base_model: str,\n\
          \    merged_model: Output[Model],\n):\n    \"\"\"Step 4: Merge LoRA adapters\
          \ back into base model.\"\"\"\n    from peft import PeftModel\n    from\
          \ transformers import AutoModelForCausalLM, AutoTokenizer\n\n    base =\
          \ AutoModelForCausalLM.from_pretrained(base_model)\n    model = PeftModel.from_pretrained(base,\
          \ lora_model.path)\n    merged = model.merge_and_unload()\n\n    merged.save_pretrained(merged_model.path)\n\
          \    AutoTokenizer.from_pretrained(base_model).save_pretrained(merged_model.path)\n\
          \n"
        image: nvcr.io/nvidia/pytorch:24.01-py3
    exec-register-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - register_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'boto3'  && \
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef register_model(\n    model: Input[Model],\n    model_name: str,\n\
          \    model_version: str,\n    s3_destination: str,\n):\n    \"\"\"Step 7:\
          \ Upload promoted model to S3 for KServe to serve.\"\"\"\n    import boto3\n\
          \    import os\n\n    s3 = boto3.client(\"s3\")\n    bucket = s3_destination.split(\"\
          /\")[2]\n    prefix = \"/\".join(s3_destination.split(\"/\")[3:])\n\n  \
          \  for root, _, files in os.walk(model.path):\n        for f in files:\n\
          \            local_path = os.path.join(root, f)\n            rel_path =\
          \ os.path.relpath(local_path, model.path)\n            s3_key = f\"{prefix}/{model_name}/{model_version}/{rel_path}\"\
          \n            s3.upload_file(local_path, bucket, s3_key)\n\n"
        image: python:3.11-slim
    exec-train-lora:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_lora
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'unsloth' 'trl'\
          \ 'peft'  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_lora(\n    training_data: Input[Dataset],\n    base_model:\
          \ str,\n    lora_r: int,\n    lora_alpha: int,\n    learning_rate: float,\n\
          \    epochs: int,\n    batch_size: int,\n    max_seq_length: int,\n    trained_model:\
          \ Output[Model],\n    training_metrics: Output[Metrics],\n):\n    \"\"\"\
          Step 3: LoRA fine-tuning via Unsloth.\"\"\"\n    import json\n    import\
          \ time\n    import jsonlines\n\n    from unsloth import FastLanguageModel\n\
          \n    start_time = time.time()\n\n    # Load base model with 4-bit quantization\n\
          \    model, tokenizer = FastLanguageModel.from_pretrained(\n        model_name=base_model,\n\
          \        max_seq_length=max_seq_length,\n        load_in_4bit=True,\n  \
          \  )\n\n    # Apply LoRA\n    model = FastLanguageModel.get_peft_model(\n\
          \        model,\n        r=lora_r,\n        lora_alpha=lora_alpha,\n   \
          \     target_modules=[\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\",\n\
          \                        \"gate_proj\", \"up_proj\", \"down_proj\"],\n \
          \       lora_dropout=0.05,\n    )\n\n    # Load training data\n    examples\
          \ = []\n    with jsonlines.open(training_data.path) as reader:\n       \
          \ for ex in reader:\n            examples.append(ex)\n\n    # Format for\
          \ SFT\n    from trl import SFTTrainer\n    from transformers import TrainingArguments\n\
          \n    trainer = SFTTrainer(\n        model=model,\n        tokenizer=tokenizer,\n\
          \        train_dataset=examples,\n        args=TrainingArguments(\n    \
          \        output_dir=trained_model.path,\n            num_train_epochs=epochs,\n\
          \            per_device_train_batch_size=batch_size,\n            gradient_accumulation_steps=4,\n\
          \            learning_rate=learning_rate,\n            lr_scheduler_type=\"\
          cosine\",\n            warmup_ratio=0.03,\n            logging_steps=10,\n\
          \            save_strategy=\"epoch\",\n            fp16=True,\n        ),\n\
          \        max_seq_length=max_seq_length,\n    )\n\n    trainer.train()\n\
          \    trainer.save_model(trained_model.path)\n\n    elapsed = time.time()\
          \ - start_time\n    training_metrics.log_metric(\"train_loss\", trainer.state.log_history[-1].get(\"\
          loss\", 0))\n    training_metrics.log_metric(\"examples_trained\", len(examples))\n\
          \    training_metrics.log_metric(\"training_time_seconds\", round(elapsed,\
          \ 1))\n    training_metrics.log_metric(\"epochs\", epochs)\n    training_metrics.log_metric(\"\
          lora_r\", lora_r)\n\n"
        image: nvcr.io/nvidia/pytorch:24.01-py3
    exec-validate-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - validate_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'jsonlines' 'pandas'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef validate_data(\n    data_path: str,\n    validation_report: Output[Artifact],\n\
          ) -> bool:\n    \"\"\"Step 0: Data quality gates. Rejects garbage before\
          \ training.\"\"\"\n    import json\n    import jsonlines\n    import os\n\
          \n    errors = []\n    total = 0\n    passed = 0\n\n    with jsonlines.open(data_path)\
          \ as reader:\n        for example in reader:\n            total += 1\n \
          \           messages = example.get(\"messages\", [])\n\n            # ChatML\
          \ format check\n            if not messages or not isinstance(messages,\
          \ list):\n                errors.append(f\"Line {total}: not ChatML format\"\
          )\n                continue\n\n            roles = [m.get(\"role\") for\
          \ m in messages]\n            if \"assistant\" not in roles:\n         \
          \       errors.append(f\"Line {total}: missing assistant response\")\n \
          \               continue\n\n            # Content quality check\n      \
          \      assistant_msg = [m for m in messages if m[\"role\"] == \"assistant\"\
          ][0]\n            content = assistant_msg.get(\"content\", \"\")\n     \
          \       if len(content) < 50:\n                errors.append(f\"Line {total}:\
          \ response too short ({len(content)} chars)\")\n                continue\n\
          \n            passed += 1\n\n    report = {\n        \"total_examples\"\
          : total,\n        \"passed\": passed,\n        \"failed\": total - passed,\n\
          \        \"pass_rate\": round(passed / max(total, 1) * 100, 1),\n      \
          \  \"errors\": errors[:50],  # Cap error list\n    }\n\n    with open(validation_report.path,\
          \ \"w\") as f:\n        json.dump(report, f, indent=2)\n\n    # Fail if\
          \ pass rate < 90%\n    return report[\"pass_rate\"] >= 90.0\n\n"
        image: python:3.11-slim
