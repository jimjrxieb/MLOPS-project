# KEDA ScaledObject for KServe + vLLM autoscaling
# Scales based on vLLM request queue depth and GPU utilization
# Requires: KEDA installed in cluster (helm install keda kedacore/keda)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: katie-3b-scaler
  namespace: ml-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: katie-3b-predictor
  minReplicaCount: 1
  maxReplicaCount: 3
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    # Scale on Prometheus metrics from vLLM
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc:9090
        # vLLM exposes num_requests_waiting — scale when queue builds up
        query: |
          sum(vllm:num_requests_waiting{namespace="ml-serving",pod=~"katie-3b-predictor.*"})
        threshold: "5"
        activationThreshold: "2"
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc:9090
        # Scale on average GPU utilization across replicas
        query: |
          avg(vllm:gpu_cache_usage_perc{namespace="ml-serving",pod=~"katie-3b-predictor.*"})
        threshold: "0.8"
