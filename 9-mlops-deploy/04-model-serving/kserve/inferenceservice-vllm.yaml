# KServe InferenceService — vLLM backend for production LLM serving
# Serves Katie 3B or JADE 8B via OpenAI-compatible API
# Deploy: kubectl apply -f inferenceservice-vllm.yaml -n ml-serving
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: katie-3b
  labels:
    app: katie
    component: model-serving
    model-version: v2.0
  annotations:
    # Autoscaling via KEDA (not Knative — LLMs can't cold start fast enough)
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/autoscalerClass: keda
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 3
    model:
      modelFormat:
        name: vllm
      runtime: vllm-runtime
      storageUri: "s3://ml-artifacts/models/katie-3b-v2.0/"
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: "24Gi"
          nvidia.com/gpu: "1"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
# JADE 8B — heavier model, separate InferenceService
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: jade-8b
  labels:
    app: jade
    component: model-serving
    model-version: v1.1
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/autoscalerClass: keda
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 2
    model:
      modelFormat:
        name: vllm
      runtime: vllm-runtime
      storageUri: "s3://ml-artifacts/models/jade-8b-v1.1/"
      resources:
        requests:
          cpu: "4"
          memory: "24Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: "32Gi"
          nvidia.com/gpu: "1"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
