# ChromaDB configuration for RAG pipeline
# Used by: 2-rag-ingestion/04-ingesting/ingest_to_chromadb.py

embedding:
  model: "nomic-embed-text:latest"
  provider: "ollama"
  url: "http://localhost:11434/api/embeddings"
  dimensions: 768  # CRITICAL: must match model output exactly

storage:
  path: "2-rag-ingestion/05-ragged-data/chroma/"
  persist: true

collections:
  - name: "jade-general"
    description: "Bulk security knowledge"
    metadata:
      domain: "security"
      source: "mixed"

  - name: "jade-kubernetes"
    description: "K8s-specific documentation"
    metadata:
      domain: "kubernetes"

  - name: "jade-consulting"
    description: "Playbooks, engagement guides, platform docs"
    metadata:
      domain: "consulting"

  - name: "jade-nist-800-53"
    description: "NIST 800-53 compliance controls"
    metadata:
      domain: "compliance"

  - name: "jade-terraform-iac"
    description: "Infrastructure as Code patterns"
    metadata:
      domain: "iac"

  - name: "jade-operational"
    description: "Developer scenario training data"
    metadata:
      domain: "operational"

  - name: "concept-links"
    description: "Ontology relationships between concepts"
    metadata:
      domain: "ontology"

quality:
  zero_vector_policy: "quarantine"  # Never insert zero vectors
  quarantine_file: "embedding_quarantine.jsonl"
  min_chunk_length: 50             # Characters, not tokens
  max_chunk_length: 2000

knowledge_graph:
  path: "GP-S3/knowledge-base/security_graph.pkl"
  format: "networkx"
