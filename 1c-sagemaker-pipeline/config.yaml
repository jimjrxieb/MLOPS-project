# Default training pipeline configuration
# Copy and modify per model/engagement

model:
  base: "unsloth/Llama-3.2-3B-Instruct"  # or Llama-3.1-8B-Instruct for JADE
  quantization: "4bit"

lora:
  r: 64
  alpha: 128
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  dropout: 0.05

training:
  epochs: 2
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.03
  max_seq_length: 4096
  weight_decay: 0.01
  seed: 42

data:
  format: "chatml"            # Only ChatML accepted
  chunk_size: 10000           # Examples per chunk
  eval_holdout_pct: 5         # 5% reserved for eval
  min_chunk_size: 500         # Below this = catastrophic forgetting

output:
  checkpoint_dir: "3-model-registry/v2.0-3b/"
  log_file: "training_v11.log"

eval:
  promotion_threshold: 60     # Weighted score % to promote
  weights:
    CKS: 40
    CKA: 25
    CNPA: 25
    Cloud: 10
  min_category_score: 50      # Each category must exceed this
