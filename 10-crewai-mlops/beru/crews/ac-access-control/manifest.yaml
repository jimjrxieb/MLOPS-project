name: ac-access-control
version: "1.0"
description: >
  BERU crew for NIST 800-53 AC-family compliance audit.
  Collects evidence via kubectl (no LLM), then runs assessor → sar_writer → poam_writer.

controls:
  - AC-2   # Account Management
  - AC-3   # Access Enforcement
  - AC-6   # Least Privilege
  - AC-17  # Remote Access

framework: NIST-800-53-Rev5
baseline: FedRAMP-Moderate

# Human playbook this crew encodes
playbook: GP-CONSULTING/AC/playbooks/02-access-control-hardening.md

# Study guide — how the playbook became this crew
study_guide: GP-CONSULTING/AC/study-guide/playbook-to-agent-workflow.md

# Evidence output (SecLAB crewai-runner writes here; crew output supplements it)
evidence_path: GP-CONSULTING/AC/evidence/

# Architecture pattern
architecture:
  step_1_collect:
    type: python          # pure kubectl, no LLM
    module: collectors.py
    function: run_ac_collectors
  step_2_assess:
    type: crewai_agent
    agent: assessor       # from BERU-AI/crew/agents.py
    output: control_determinations
  step_3_sar:
    type: crewai_agent
    agent: sar_writer
    output: security_assessment_report
  step_4_poam:
    type: crewai_agent
    agent: poam_writer
    output: poam_registry

# Why Step 1 is Python, not an agent
rationale: >
  kubectl output is structured data. An LLM adds hallucination risk to data collection
  without adding value. The collector runs deterministically and hands clean evidence
  to the agents. BERU-family agents are reserved for reasoning tasks (assess, write, cite)
  not data retrieval tasks (list, get, describe).

# Rank boundaries
rank_boundaries:
  automated: D          # E/D findings collected and reported without human
  propose:   C          # C-rank findings proposed to human for approval
  escalate:  B          # B-rank escalated with full context (e.g. cluster-admin binding)
  human_only: S         # S-rank: human-only decision

# Relationship to SecLAB crewai-runner
seclab_runner: >
  GP-SECLAB/SecLAB-setup/03-n8n/crewai-runner/ is the production evidence collector.
  This BERU-AI crew is the training/development version that uses CrewAI agents
  for the assessment + reporting phases (instead of direct Ollama API calls).
  Use the SecLAB runner for live evidence collection. Use this crew for
  agent training data generation and offline analysis.
