project:
  name: BERU-Capstone
  version: v1.0-3b
  author: LinkOps Industries
  capstone_module: "M3 \u2014 Fine-Tuning"
model:
  base_model: unsloth/Llama-3.2-3B-Instruct
  max_seq_length: 8192
  load_in_4bit: true
lora:
  r: 32
  alpha: 64
  dropout: 0
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
training:
  epochs_per_chunk: 2
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  warmup_ratio: 0.03
  lr_scheduler: cosine
  weight_decay: 0.01
  logging_steps: 5
  eval_steps: 25
  save_strategy: epoch
validation:
  enabled: true
  split_file: 1-local-pipeline/01-raw-data-lake/beru_validation_v1.jsonl
  not_to_be_confused_with: 'The 4-eval-clarify/beru_*_brain_v*.jsonl suites are the
    FINAL held-out evals

    (used post-fine-tune to compute promotion gate scores per D-010).

    This validation_v1 set is used DURING training to monitor loss curves only.

    '
paths:
  pipeline_dir: 1-local-pipeline
  raw_input: 1-local-pipeline/01-raw-data-lake/beru_training_v1.jsonl
  etl_output: 1-local-pipeline/02-ETL-data/beru_v1
  untrained_chunks: 1-local-pipeline/03-chunked-untrained/beru_v1
  trained_chunks: 1-local-pipeline/04-trained-data/beru_v1
  model_registry: 3-model-registry/beru-v1.0-3b
  eval_dir: 4-eval-clarify
  results_dir: 4-eval-clarify/3-results/beru
  experiment_dir: 5-experiments/exp-006-beru-v1.0
data_quality_gate:
  test: 8-tests/test_beru_training_data.py
  blocking: true
  required_passes:
  - TestChatMLFormat
  - TestControlIDValidity
  - TestCorpusQuality
  reason: 'Training MUST NOT run if the corpus has wrong control-name pairings,

    cookie-cutter remediation, or fewer than 30% adversarial examples.

    The bad-200 corpus would have passed pre-D-012 but fails the D-012 gates.

    '
promotion_gate:
  knowledge_brain:
    overall_threshold: 0.7
    per_type_floor: 0.6
    must_beat_baseline: true
    baseline_score: 0.294
  pentest_brain:
    overall_threshold: 0.7
    per_category_floor: 0.5
    critical_categories:
    - LLM01
    - LLM06
    - LLM08
    critical_floor: 0.7
    must_not_regress_against_baseline: true
    baseline_score: 0.403
references:
  design_decisions: CAPSTONE-PROJECT/beru-design-decisions.md
  rag_corpus_collection: beru-nist-800-53
  baseline_experiment: 5-experiments/exp-005-beru-3b-baseline
  fine_tune_experiment: 5-experiments/exp-006-beru-v1.0
  model_card: 6-model-cards/challenger/beru-v1.md
  inventory_register: CAPSTONE-PROJECT/templates/ai-inventory-register.md
exp_012_overrides:
  corpus: combined ~1230 (392 SSP-grading + 679-adversarial + 156-analyst, deduped)
  adversarial_ratio_actual: 0.222
  d012_adversarial_floor: "RELAXED \u2014 SSP-grading set added; adversarial still\
    \ ~50% of the corpus"
  max_seq_length: 8192
  epochs: 2
  batch_size: 2
  grad_accum: 8
  rag_top_k: 2
  train_on_responses_only: true
