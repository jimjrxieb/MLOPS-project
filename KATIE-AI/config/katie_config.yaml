# Katie Configuration
# Fast Classification Engine for GP-Copilot
# Updated: February 2026

version:
  katie_model: "katie:v1.0"
  updated: "2026-02-26"

llm:
  provider: "ollama"
  ollama:
    base_url: "http://localhost:11434"
    model: "katie:v1.0"
    timeout: 30  # Katie is fast — short timeout

# Classification focus
classification:
  # Rank routing
  rank_labels: ["E", "D", "C", "B", "S"]
  confidence_threshold: 0.80  # Below this, escalate to JADE

  # Agent routing
  agent_targets:
    - jsa-devsec    # CI/CD, SAST, secrets
    - jsa-infrasec  # Runtime K8s, CIS benchmarks
    - jsa-secops    # Incident response, threat detection

# Performance tuning (speed over depth)
performance:
  max_tokens: 200
  temperature: 0.3  # Low temperature = consistent classification
  enable_streaming: false  # Classification doesn't need streaming
