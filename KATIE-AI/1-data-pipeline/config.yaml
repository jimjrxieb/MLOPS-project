# Katie Training Configuration
# Pipeline: KATIE-AI/1-data-pipeline
# Focus: Fast classification, CKS-heavy

project:
  name: "Katie-Classifier"
  version: "v1.0"
  author: "LinkOps Industries"

model:
  base_model: "unsloth/Llama-3.2-3B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 64
  alpha: 128
  dropout: 0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  epochs_per_chunk: 2
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  weight_decay: 0.01
  logging_steps: 1

paths:
  pipeline_dir: "1-data-pipeline"
  raw_data: "1-data-pipeline/01-raw-data-lake"
  etl_data: "1-data-pipeline/02-ETL-data"
