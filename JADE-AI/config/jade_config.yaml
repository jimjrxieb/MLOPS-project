# JADE Configuration
# S-Rank AI Command Center for GP-Copilot
# Updated: January 2026
#
# Architecture:
#   - Tony Stark = JADE (offline 7B LLM, security decisions)
#   - Jarvis = Claude Code (orchestration, context, refinement)
#   - Iron Legion = JSA agents (autonomous workers)

# ============================================================
# VERSION - SINGLE SOURCE OF TRUTH
# ============================================================
# Change this ONE place when upgrading JADE model versions.
# All components read from here via JADE-AI/config/version.py
version:
  jade_model: "jade:v1.0"                  # Ollama local model (primary)
  jade_fallback: "jade:v0.9"               # Ollama fallback if v1.0 unavailable
  updated: "2026-01-30"

# ============================================================
# LLM PROVIDER CONFIGURATION
# ============================================================
llm:
  # Provider selection: "anthropic" | "ollama" | "openai" | "gemini"
  # This is the primary provider to try first. If it fails, fallbacks are attempted.
  provider: "ollama"
  # Priority list for LLM providers. JADE will try them in order until one is available.
  provider_priority:
    - ollama
    - anthropic
    - gemini
    - openai

  # Ollama provider (primary - local jade:v1.0 fine-tuned model)
  ollama:
    base_url: "http://localhost:11434"
    model: "jade:v1.0"                  # Local fine-tuned model (primary)
    fallback: "jade:v0.9"               # Fallback if v1.0 unavailable
    timeout: 120                         # Request timeout in seconds

  # Anthropic provider (fallback - cloud API)
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-haiku-4-5-20251001"  # Cloud fallback if Ollama unavailable
    timeout: 120                         # Request timeout in seconds

  # Google Gemini provider (alternative)
  gemini:
    api_key_env: "GOOGLE_API_KEY"
    model: "gemini-pro"                # Or gemini-1.5-pro for longer context
    timeout: 120

# ============================================================
# RAG CONFIGURATION
# ============================================================
rag:
  enabled: true
  db_path: "/home/jimmie/linkops-industries/GP-copilot/GP-MODEL-OPS/2-rag-ingestion/05-ragged-data/chroma"
  top_k: 5
  min_similarity: 0.7

  collections:
    - "jade-general"                   # Security knowledge (20k+ docs)
    - "jade-kubernetes"                # K8s security
    - "jade-cloud-security"            # Cloud patterns
    - "jade-policy-as-code"            # OPA/Rego policies
    - "concept-links"                  # Error→Fix mappings (CKV_K8S_22→readOnlyRootFilesystem)

# ============================================================
# MEMORY CONFIGURATION
# ============================================================
memory:
  enabled: true
  max_history: 20
  persist: true
  storage_path: "/home/jimmie/linkops-industries/GP-copilot/GP-MODEL-OPS/JADE-AI/logs/memory"

# ============================================================
# JSA MULTI-AGENT ARCHITECTURE
# ============================================================
# Three specialized agents (stateless Helm deployments):
#   - jsa-ci (20%): GitHub/GitLab, secrets, SAST, dependencies
#   - jsa-devsecops (70%): K8s, OPA, Gatekeeper, Kyverno, IaC
#   - jsa-monitor (10%): Threat detection, escalation only

jsa:
  # JSA log paths (JADE reads these for summaries and escalations)
  log_base: "/home/jimmie/linkops-industries/GP-copilot/GP-BEDROCK-AGENTS/jadeSecureAgent/target-slot-logs"

  # Multi-agent deployment
  agents:
    jsa-ci:
      chart_path: "GP-BEDROCK-AGENTS/charts/jsa-ci"
      workload_percent: 20
      domains:
        - github-actions
        - gitlab-ci
        - secrets
        - sast
        - dependencies
      rank_capability: "D"             # Auto-fixes D-rank findings

    jsa-devsecops:
      chart_path: "GP-BEDROCK-AGENTS/charts/jsa-devsecops"
      workload_percent: 70
      domains:
        - kubernetes
        - policy-as-code               # OPA, Gatekeeper, Kyverno
        - iac                          # Terraform, CloudFormation
        - cloud                        # AWS, Azure, GCP
        - compliance                   # SOC2, PCI, HIPAA
      rank_capability: "D"             # Auto-fixes D-rank findings

    jsa-monitor:
      chart_path: "GP-BEDROCK-AGENTS/charts/jsa-monitor"
      workload_percent: 10
      domains:
        - threat-detection
        - cloudtrail
        - guardduty
        - falco
      rank_capability: "READ_ONLY"     # Escalation only, no fixes

  # Instance monitoring
  instances:
    - "01-instance"                    # Production apps
    - "02-instance"                    # kubernetes-goat + DEFENSE-project

  # Log structure per instance
  log_structure:
    scans: "scans/"
    fixes: "fixes/"
    rescans: "rescans/"
    escalations: "escalations/"
    training: "gpi-{instance}-training-data/"

# ============================================================
# RANK CLASSIFICATION (sklearn + rules)
# ============================================================
# Hybrid classifier: Rules first, ML for ambiguous cases
#
# Rank Philosophy:
#   E-Rank: Trivial (formatting, lint), auto-fix immediately
#   D-Rank: JSA specialties (CVEs, K8s, SAST), auto-fix
#   C-Rank: Junior approval (Helm, Terraform, multi-file)
#   B-Rank: Senior review (architecture, IAM wildcards)
#   S-Rank: Security incident, escalate via jsa-monitor

rank_classifier:
  type: "hybrid"                       # "rules" | "ml" | "hybrid"

  # sklearn model configuration
  ml:
    model_path: "/home/jimmie/linkops-industries/GP-copilot/GP-MODEL-OPS/JADE-AI/ml/models/rank_classifier.pkl"
    feature_engineering: true
    retrain_on_feedback: true          # Retrain when humans correct rankings

  # Confidence thresholds
  thresholds:
    rule_confidence: 0.75              # Use ML when rule confidence below this
    ml_confidence: 0.70                # Trust ML when confidence above this
    use_ensemble: true                 # Vote when methods disagree

  # Feedback loop (for ML retraining)
  feedback:
    enabled: true
    log_path: "/home/jimmie/linkops-industries/GP-copilot/GP-OPENSEARCH/01-unprocessed/operational-training-data/rank_feedback.jsonl"

# ============================================================
# NPC INTEGRATION (Phases 1-5)
# ============================================================
npc:
  # Phase 1: Security Assessment (14 scanner NPCs)
  scanners_path: "/home/jimmie/linkops-industries/GP-copilot/GP-CONSULTING/1-Security-Assessment"

  # Phase 2: App-Sec Fixes (7 fixer NPCs)
  fixers_path: "/home/jimmie/linkops-industries/GP-copilot/GP-CONSULTING/2-App-Sec-Fixes"

  # Phase 3: Hardening (10 hardening NPCs)
  hardening_path: "/home/jimmie/linkops-industries/GP-copilot/GP-CONSULTING/3-Hardening"

  # Scanner inventory
  scanners:
    secrets: ["gitleaks"]
    sast: ["bandit", "semgrep"]
    dependencies: ["trivy", "grype", "snyk"]
    kubernetes: ["kubescape", "polaris", "kube-bench"]
    iac: ["checkov", "tfsec", "conftest"]
    quality: ["eslint", "hadolint"]
    cloud: ["prowler"]

  # Fixer inventory
  fixers:
    - secrets-fixer
    - code-fixer
    - dependency-fixer
    - kubernetes-fixer
    - ci-fixer
    - conftest-fixer
    - gha-fixer

  elevated_permissions: true

# ============================================================
# AGENTIC ENGINE (Claude Code style)
# ============================================================
agentic:
  enabled: true

  # Tools available to JADE
  tools:
    - scan                             # Run security scans
    - fix                              # Apply fixes
    - query_rag                        # Query knowledge base
    - run_command                      # Shell commands (sandboxed)
    - read_file                        # Read files
    - list_files                       # List directories
    - grep                             # Search content
    - kubectl                          # K8s operations

  # Conversational mode (bypass tool reasoning for greetings)
  conversational_fast_path: true

  # Max iterations per task
  max_iterations: 10

# ============================================================
# CAPABILITIES CONFIGURATION
# ============================================================
capabilities:
  # Log Analysis
  log_analyzer:
    enabled: true
    default_timeframe: "1h"
    summary_format: "executive"

  # Escalation Handler
  escalation_handler:
    enabled: true
    auto_fix: false                    # Require approval for fixes
    training_data_generation: true

  # Agent Commander
  agent_commander:
    enabled: true
    deploy_jsa: false                  # JADE can deploy JSA instances
    modify_configs: false              # Allow config modifications

  # Insight Engine
  insight_engine:
    enabled: true
    trend_analysis: true
    recommendations: true

# ============================================================
# CLI CONFIGURATION
# ============================================================
cli:
  prompt: "JADE> "
  history_file: "/home/jimmie/linkops-industries/GP-copilot/GP-MODEL-OPS/JADE-AI/.jade_history"
  color_output: true

  quick_commands:
    status: "Show JSA instance status"
    summarize: "Summarize JSA activity"
    fix-escalations: "Fix escalated issues"
    insights: "Show strategic insights"

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging:
  level: "INFO"
  file: "/home/jimmie/linkops-industries/GP-copilot/GP-MODEL-OPS/JADE-AI/logs/jade.log"
  max_size_mb: 100
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Chat logging (readable JSON per session)
  chat:
    enabled: true
    path: "/home/jimmie/linkops-industries/GP-copilot/GP-CLOUDWATCH/jade-chat"
    format: "json"                     # Readable JSON, not JSONL

# ============================================================
# PERFORMANCE CONFIGURATION
# ============================================================
performance:
  max_tokens: 500
  temperature: 0.7
  enable_streaming: true
  cache_responses: false

# ============================================================
# SECURITY CONFIGURATION
# ============================================================
security:
  mask_secrets_in_logs: true
  secret_patterns:
    - "password"
    - "api_key"
    - "secret"
    - "token"
    - "credential"
    - "private_key"

  allow_shell_commands: true
  sandbox_mode: false

# ============================================================
# CONSULTING ENGAGEMENTS
# ============================================================
# Access models for client work (see GP-ENGAGEMENTS/)
#   - full: Internal, own repos
#   - fork: Client provides copy
#   - agent: Deploy agents only, no code access
#   - cicd: Pipeline integration
#   - airgapped: On-site only

engagements:
  config_path: "/home/jimmie/linkops-industries/GP-copilot/GP-ENGAGEMENTS"
  internal_dir: "internal"
  clients_dir: "clients"
