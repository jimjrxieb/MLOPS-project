# FAULTY KUBERNETES SECRETS EXAMPLE #1
# Common Mistakes: Insecure Secret Management
# Issues:
#   1. Plain text secrets in manifest (visible in git)
#   2. No encryption at rest annotation
#   3. Generic Opaque type (no validation)
#   4. Secrets in default namespace
#   5. No labels for rotation tracking
#   6. Mounted with read-write permissions
#   7. Service account token automounted
#
# Severity: CRITICAL (credential exposure)
# Compliance: CIS K8s 5.4.1, SOC2 CC6.1

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  # BUG #4: Default namespace - easy to accidentally access
  namespace: default
  # BUG #5: No labels for tracking/rotation
spec:
  # BUG #3: Opaque type has no schema validation
  type: Opaque
  # BUG #1: CRITICAL - Plain text values (base64 is NOT encryption!)
  data:
    # These are just base64 encoded - anyone can decode
    database-url: cG9zdGdyZXM6Ly9hZG1pbjpzdXBlcnNlY3JldEBkYjo1NDMyL2FwcA==
    # postgres://admin:supersecret@db:5432/app

    api-key: c2stbGl2ZS1hYmNkZWYxMjM0NTY3ODkw
    # sk-live-abcdef1234567890

    aws-secret-key: QUtJQUlPU0ZPRE5ON0VYQU1QTEUK
    # AKIAIOSFODNN7EXAMPLE

---
# BUG #7: Pod with automounted service account
apiVersion: v1
kind: Pod
metadata:
  name: app-pod
  namespace: default
spec:
  # BUG #7: Default SA with token automounted
  # automountServiceAccountToken: true (default)

  containers:
    - name: app
      image: myapp:latest
      # BUG #6: Secret mounted as writable volume
      volumeMounts:
        - name: secrets
          mountPath: /secrets
          # readOnly: false (default)

      # BUG: Secrets as env vars appear in logs/inspect
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: api-key

  volumes:
    - name: secrets
      secret:
        secretName: app-secrets
        # BUG: Default mode 0644 - world readable
