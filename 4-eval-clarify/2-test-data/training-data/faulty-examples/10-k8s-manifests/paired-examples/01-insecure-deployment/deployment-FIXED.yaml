# FIXED VERSION OF EXAMPLE #1
# Fixes Applied:
#   ✅ 1. Running as non-root user (uid 1000)
#   ✅ 2. Resource limits and requests defined
#   ✅ 3. Removed privileged mode
#   ✅ 4. Added liveness and readiness probes
#   ✅ 5. Using specific image tag with digest
#   ✅ 6. Added pod anti-affinity for HA
#   ✅ 7. Removed host network access
#   ✅ 8. Secrets from external secret (not hardcoded)
#   ✅ 9. Read-only root filesystem
#   ✅ 10. Dropped all capabilities

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}

  # ✅ FIXED: Safe rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      annotations:
        # Force pod restart on config change
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      # ✅ FIXED: Removed hostNetwork (no host access needed)

      # ✅ FIXED: Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: {{ include "app.serviceAccountName" . }}

      # ✅ FIXED: Disable automounting SA token unless needed
      automountServiceAccountToken: false

      containers:
      - name: {{ .Chart.Name }}
        # ✅ FIXED: Specific tag and digest for immutability
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}@{{ .Values.image.digest }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        # ✅ FIXED: Container security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        # ✅ FIXED: Liveness probe for self-healing
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # ✅ FIXED: Readiness probe for safe traffic routing
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # ✅ FIXED: Resource limits prevent resource exhaustion
        resources:
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}

        # ✅ FIXED: Secrets from external secret manager
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.secretName }}
              key: connection-string

        # ✅ FIXED: Writable volumes for app needs
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

      # ✅ FIXED: Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - {{ include "app.name" . }}
              topologyKey: kubernetes.io/hostname

      # ✅ FIXED: Tolerations for scheduling flexibility
      tolerations:
      {{- toYaml .Values.tolerations | nindent 8 }}
