# FIXED VERSION OF EXAMPLE #3
# Fixes Applied:
#   ✅ 1. TLS/SSL enabled with cert-manager
#   ✅ 2. Specific hostnames (no wildcards)
#   ✅ 3. Rate limiting configured
#   ✅ 4. CORS configured properly
#   ✅ 5. Security headers added
#   ✅ 6. Authentication required for sensitive paths
#   ✅ 7. Admin/debug paths protected or removed
#   ✅ 8. HTTP to HTTPS redirect
#   ✅ 9. HSTS header for security

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    # Ingress controller
    kubernetes.io/ingress.class: nginx

    # ✅ FIXED: TLS certificate management
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.issuer | default "letsencrypt-prod" }}
    cert-manager.io/acme-challenge-type: http01

    # ✅ FIXED: Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # ✅ FIXED: Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

    # ✅ FIXED: Rate limiting to prevent DoS
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # ✅ FIXED: CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "3600"

    # ✅ FIXED: Request size limits
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # ✅ FIXED: Timeout configuration
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # ✅ FIXED: Modern TLS only (TLS 1.2+)
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

spec:
  # ✅ FIXED: TLS configuration with cert-manager
  tls:
    - hosts:
        - {{ .Values.ingress.hostname }}
      secretName: {{ include "app.fullname" . }}-tls

  rules:
    # ✅ FIXED: Specific hostname (no wildcards)
    - host: {{ .Values.ingress.hostname }}
      http:
        paths:
          # Public application paths
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}

          # API endpoints
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}

          # Static assets (with caching)
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}

{{- end }}

---
# ✅ FIXED: Separate ingress for admin with authentication
{{- if and .Values.ingress.enabled .Values.ingress.admin.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.fullname" . }}-admin
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.issuer | default "letsencrypt-prod" }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # ✅ FIXED: Authentication required for admin paths
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ include "app.fullname" . }}-admin-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - Admin Area"

    # ✅ FIXED: IP whitelist for admin access
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ .Values.ingress.admin.allowedIPs | join "," }}

    # ✅ FIXED: Stricter rate limiting for admin
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-connections: "5"

    # ✅ FIXED: All security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Content-Security-Policy: default-src 'self'";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

spec:
  tls:
    - hosts:
        - {{ .Values.ingress.admin.hostname }}
      secretName: {{ include "app.fullname" . }}-admin-tls

  rules:
    - host: {{ .Values.ingress.admin.hostname }}
      http:
        paths:
          # Admin dashboard (protected)
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}

---
# ✅ FIXED: Internal-only ingress for metrics (not exposed externally)
# Metrics should only be accessible from within the cluster
{{- if and .Values.ingress.enabled .Values.metrics.enabled .Values.metrics.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.fullname" . }}-metrics
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
  annotations:
    kubernetes.io/ingress.class: nginx-internal  # Internal ingress only
    # ✅ No external access - internal monitoring only
spec:
  rules:
    - host: {{ include "app.fullname" . }}-metrics.internal
      http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.fullname" . }}-metrics
                port:
                  number: 9090
{{- end }}
