# JADE Operational Playbook: Secret Not Found
# Pod fails because referenced Secret doesn't exist

name: Secret-Not-Found
category: resource-failures
severity: HIGH
frequency: COMMON

trigger_patterns:
  - "secret.*not found"
  - "couldn't find key.*in Secret"
  - "MountVolume.SetUp failed for volume.*secret"
  - "failed to sync.*secret"
  - "CreateContainerConfigError"
  - "imagepullsecret"

description: |
  Pod references a Secret that doesn't exist or is missing expected keys.
  Higher severity than ConfigMap because secrets are often critical
  (credentials, TLS certs, image pull secrets).

gameplan:
  step_1:
    name: "Identify the missing Secret"
    commands:
      - "kubectl describe pod {pod} -n {ns} | grep -i secret"
      - "kubectl get events -n {ns} --field-selector involvedObject.name={pod}"
      - "kubectl get pod {pod} -n {ns} -o yaml | grep -A5 -i secret"

    extract:
      - "Secret name"
      - "Secret namespace"
      - "Usage type (volume, env, imagePullSecret, serviceAccountToken)"
      - "Specific key if applicable"

  step_2_check_secret_exists:
    name: "Verify Secret existence"
    commands:
      - "kubectl get secret {secret} -n {ns}"
      - "kubectl get secret -n {ns}"

    branches:
      secret_missing:
        indicator: "not found"
        meaning: "Secret doesn't exist in this namespace"
        fix_rank: "C"
        causes:
          - "Secret not created yet"
          - "Sealed Secret not unsealed"
          - "External Secrets not synced"
          - "Secret in wrong namespace"
          - "Name typo"
          - "Secret deleted"

      secret_exists:
        indicator: "Secret found"
        meaning: "Secret exists, check specific key"
        next_step: "Verify key exists"

  step_3_check_keys:
    name: "Verify Secret has expected keys"
    commands:
      - "kubectl get secret {secret} -n {ns} -o jsonpath='{.data}' | jq 'keys'"
      - "kubectl describe secret {secret} -n {ns}"

    note: "Don't output actual secret values in logs!"

    common_issues:
      wrong_key_name:
        example: "Expects 'password' but has 'PASSWORD'"
        fix_rank: "D"

      key_missing:
        example: "Expects 'tls.crt' but only has 'tls.key'"
        fix_rank: "C"

      wrong_type:
        example: "Expects kubernetes.io/tls but is Opaque"
        fix_rank: "C"

  step_4_secret_types:
    name: "Handle different Secret types"

    opaque:
      type: "Opaque"
      use: "Generic key-value secrets"
      create: |
        kubectl create secret generic {name} -n {ns} \
          --from-literal=username=admin \
          --from-literal=password=secret123

    tls:
      type: "kubernetes.io/tls"
      use: "TLS certificates"
      required_keys: ["tls.crt", "tls.key"]
      create: |
        kubectl create secret tls {name} -n {ns} \
          --cert=/path/to/tls.crt \
          --key=/path/to/tls.key

    docker_config:
      type: "kubernetes.io/dockerconfigjson"
      use: "Image pull secrets"
      required_keys: [".dockerconfigjson"]
      create: |
        kubectl create secret docker-registry {name} -n {ns} \
          --docker-server=registry.example.com \
          --docker-username=user \
          --docker-password=pass

    service_account_token:
      type: "kubernetes.io/service-account-token"
      use: "ServiceAccount tokens"
      note: "Auto-created for ServiceAccounts"
      create: |
        # Usually auto-created, but for manual:
        apiVersion: v1
        kind: Secret
        metadata:
          name: {sa}-token
          annotations:
            kubernetes.io/service-account.name: {sa}
        type: kubernetes.io/service-account-token

    basic_auth:
      type: "kubernetes.io/basic-auth"
      use: "Basic authentication"
      required_keys: ["username", "password"]

    ssh_auth:
      type: "kubernetes.io/ssh-auth"
      use: "SSH keys"
      required_keys: ["ssh-privatekey"]

  step_5_check_secret_sources:
    name: "Check if Secret should come from external source"

    sealed_secrets:
      check: "kubectl get sealedsecret -n {ns}"
      fix: |
        # Check if SealedSecret exists
        kubectl get sealedsecret {name} -n {ns}
        # Check sealed-secrets controller
        kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets

    external_secrets:
      check: "kubectl get externalsecret -n {ns}"
      fix: |
        # Check ExternalSecret status
        kubectl describe externalsecret {name} -n {ns}
        # Check ESO controller
        kubectl get pods -n external-secrets

    vault_injector:
      check: "kubectl get mutatingwebhookconfiguration | grep vault"
      note: "Vault injects secrets via sidecar"

  step_6_fix_options:
    name: "Resolution options"

    create_secret:
      description: "Create the missing Secret"
      rank: "C"
      note: "BE CAREFUL - don't log/expose secret values"
      template: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: {secret}
          namespace: {ns}
        type: Opaque
        data:
          key1: <base64-encoded-value>
          key2: <base64-encoded-value>

    create_from_literals:
      description: "Create Secret from command line"
      rank: "C"
      command: |
        kubectl create secret generic {secret} -n {ns} \
          --from-literal=key1=value1 \
          --from-literal=key2=value2

    create_from_file:
      description: "Create Secret from file"
      rank: "C"
      command: |
        kubectl create secret generic {secret} -n {ns} \
          --from-file=credentials=/path/to/file

    copy_from_namespace:
      description: "Copy Secret from another namespace"
      rank: "C"
      command: |
        kubectl get secret {secret} -n {source-ns} -o yaml | \
          sed 's/namespace: {source-ns}/namespace: {ns}/' | \
          kubectl apply -f -

    add_missing_key:
      description: "Add key to existing Secret"
      rank: "C"
      command: |
        # Get current, add key, apply
        kubectl get secret {secret} -n {ns} -o json | \
          jq '.data.newkey = "base64value"' | \
          kubectl apply -f -

    make_optional:
      description: "Make Secret reference optional"
      rank: "D"
      template: |
        # For env
        envFrom:
        - secretRef:
            name: {secret}
            optional: true

        # For volume
        volumes:
        - name: secret-vol
          secret:
            secretName: {secret}
            optional: true

  step_7_image_pull_secrets:
    name: "Handle imagePullSecrets specifically"

    diagnose:
      commands:
        - "kubectl get pod {pod} -n {ns} -o jsonpath='{.spec.imagePullSecrets}'"
        - "kubectl get serviceaccount {sa} -n {ns} -o jsonpath='{.imagePullSecrets}'"

    fix_pod_level:
      description: "Add imagePullSecret to pod"
      rank: "D"
      template: |
        spec:
          imagePullSecrets:
          - name: {secret}

    fix_serviceaccount:
      description: "Add imagePullSecret to ServiceAccount"
      rank: "D"
      command: |
        kubectl patch serviceaccount {sa} -n {ns} \
          -p='{"imagePullSecrets":[{"name":"{secret}"}]}'

  step_8_verify_fix:
    name: "Verify fix"
    commands:
      - "kubectl get secret {secret} -n {ns}"
      - "kubectl get secret {secret} -n {ns} -o jsonpath='{.data}' | jq 'keys'"
      - "kubectl delete pod {pod} -n {ns}  # Force recreation"
      - "kubectl get pod {pod} -n {ns}"

    success_criteria:
      - "Secret exists with correct type"
      - "All required keys present"
      - "Pod starts successfully"
      - "Application authenticates correctly"

common_auto_fixes:
  - id: "secret-make-optional"
    trigger: "Secret not found AND not critical"
    rank: "D"
    action: "patch_pod_optional_secret"

  - id: "secret-copy-ns"
    trigger: "Secret exists in other namespace"
    rank: "C"
    action: "copy_secret_namespace"

escalation_triggers:
  - condition: "Need to create credential secret"
    escalate_to: "JADE"
    reason: "Credential management decision"

  - condition: "TLS secret missing for production ingress"
    escalate_to: "JADE"
    reason: "TLS/security decision needed"

  - condition: "Multiple apps missing same secret"
    escalate_to: "JADE"
    reason: "Possible secrets management issue"

  - condition: "External secret sync failing"
    escalate_to: "JADE"
    reason: "External system integration issue"

security_notes:
  - "NEVER log secret values"
  - "NEVER commit secrets to git"
  - "Use SealedSecrets or ExternalSecrets in production"
  - "Rotate secrets regularly"
  - "Use least-privilege access to secrets"
  - "Consider secrets encryption at rest"
  - "Audit secret access with Falco"

related_playbooks:
  - configmap-not-found
  - imagepullbackoff
  - createcontainererror
