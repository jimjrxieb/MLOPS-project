# FIXED VERSION OF KUBERNETES SECRETS EXAMPLE #1
# Fixes Applied:
#   1. External Secrets Operator for secret injection
#   2. Encryption at rest enabled (cluster-level)
#   3. Typed secrets where applicable
#   4. Dedicated namespace with RBAC
#   5. Labels for rotation tracking
#   6. Read-only mounts with restrictive permissions
#   7. Service account token disabled
#
# Compliance: CIS K8s 5.4.1, SOC2 CC6.1, NIST SC-28

---
# FIXED: Namespace with resource quota
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    pod-security.kubernetes.io/enforce: restricted
    secrets-rotation: enabled

---
# FIXED: External Secrets Operator SecretStore
# Secrets are fetched from AWS Secrets Manager at runtime
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: production
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
# FIXED: ExternalSecret - references secrets in AWS SM
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: production
  labels:
    app.kubernetes.io/name: api
    secrets.rotation/last-rotated: "2024-01-15"
    secrets.rotation/next-rotation: "2024-04-15"
spec:
  refreshInterval: 1h  # Periodic refresh from source
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore

  target:
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: api
          managed-by: external-secrets

  data:
    # FIXED: Reference to external secret, not hardcoded
    - secretKey: database-url
      remoteRef:
        key: production/api/database
        property: connection-string

    - secretKey: api-key
      remoteRef:
        key: production/api/credentials
        property: api-key

---
# FIXED: Secure Pod configuration
apiVersion: v1
kind: Pod
metadata:
  name: app-pod
  namespace: production
  labels:
    app.kubernetes.io/name: api
spec:
  # FIXED: Disable service account token automount
  automountServiceAccountToken: false

  # FIXED: Dedicated service account with minimal permissions
  serviceAccountName: api-service-account

  # FIXED: Pod security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containers:
    - name: app
      image: myapp:v1.2.3@sha256:abc123...

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      # FIXED: Secrets as files, not env vars (harder to leak)
      volumeMounts:
        - name: secrets
          mountPath: /secrets
          readOnly: true  # FIXED: Read-only mount
        - name: tmp
          mountPath: /tmp

      # FIXED: Only non-sensitive config as env vars
      env:
        - name: LOG_LEVEL
          value: "info"
        - name: SECRET_PATH
          value: "/secrets"

      # FIXED: Secret file paths for app to read
      # App reads /secrets/database-url instead of env var

  volumes:
    - name: secrets
      secret:
        secretName: app-secrets
        # FIXED: Restrictive permissions
        defaultMode: 0400  # Owner read only
        items:
          - key: database-url
            path: database-url
            mode: 0400
          - key: api-key
            path: api-key
            mode: 0400
    - name: tmp
      emptyDir: {}

---
# FIXED: RBAC - only specific SA can read secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: production
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]  # FIXED: Specific secret only
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-secret-reader
  namespace: production
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: production
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
