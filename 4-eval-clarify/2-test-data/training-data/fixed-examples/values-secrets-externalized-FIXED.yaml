# FIXED: Helm values.yaml with externalized secrets - safe to commit
replicaCount: 3

image:
  repository: myapp/backend
  tag: "v2.1.0"
  pullPolicy: IfNotPresent

# Database config - credentials from external secrets
database:
  host: prod-postgresql.acme.internal
  port: 5432
  name: payments_db
  # Reference Kubernetes Secret instead of hardcoding
  existingSecret: "database-credentials"
  secretKeys:
    username: "db-username"
    password: "db-password"

# API keys from external secrets operator or sealed secrets
apiKeys:
  # Use External Secrets Operator to sync from AWS Secrets Manager
  externalSecret:
    enabled: true
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    target:
      name: api-keys
    data:
      - secretKey: stripe
        remoteRef:
          key: prod/api-keys
          property: stripe_api_key
      - secretKey: sendgrid
        remoteRef:
          key: prod/api-keys
          property: sendgrid_api_key
      - secretKey: datadog
        remoteRef:
          key: prod/api-keys
          property: datadog_api_key

# AWS credentials via IRSA (IAM Roles for Service Accounts)
aws:
  region: "us-east-1"
  # Use IRSA instead of static credentials
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/MyAppRole

# TLS from cert-manager
tls:
  enabled: true
  # Use cert-manager to manage certificates
  certManager:
    enabled: true
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer
  # Or reference existing secret
  existingSecret: "myapp-tls"

# JWT secret from sealed secret
auth:
  existingSecret: "jwt-secret"
  secretKey: "jwt-signing-key"
