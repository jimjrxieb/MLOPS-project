# BERU stack — one command boots the whole thing:
#
#   cd GP-MODEL-OPS/BERU-AI
#   docker compose up --build
#
# Services:
#   ollama      — the inference server (LLaMA 3.2-3B fine-tune, served as beru:v1.4)
#   model-init  — one-shot: registers beru:v1.4 from the mounted GGUF, then exits
#   beru-api    — the FastAPI service (LangGraph agent + guards + HITL + MLflow tracking)
#   n8n         — workflow automation (http://localhost:5678)
#   crewai      — multi-agent crews wired to BERU (http://localhost:8089)
#
# Then: http://localhost:8088/docs  (Swagger UI)
#       http://localhost:8088/api/beru/health
#       http://localhost:5678           (n8n UI — admin / changeme)
#       http://localhost:8089/docs      (CrewAI service — Swagger UI)
#
# Self-contained: the agent reads its NIST 800-53 corpus + AI RMF frameworks
# from the bundled knowledge/ dir (baked into the image) — no playbook mounts
# needed. The only host path mounted is the GGUF for model-init.

services:

  ollama:
    image: ollama/ollama:latest
    container_name: beru-ollama
    ports:
      - "11434:11434"          # exposed for debugging; beru-api uses the internal network
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  model-init:
    image: ollama/ollama:latest
    container_name: beru-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ../3-model-registry/beru-v1.4-3b/gguf:/gguf:ro
      - ./docker:/docker:ro
    # Register beru:v1.4 from the mounted GGUF, then exit. If it already exists
    # this is a fast no-op.
    entrypoint: ["sh", "-c", "ollama create beru:v1.4 -f /docker/Modelfile.container && ollama list"]
    restart: "no"

  beru-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: beru-api:1.4
    container_name: beru-api
    depends_on:
      model-init:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    environment:
      OLLAMA_HOST: http://ollama:11434
      BERU_MODEL: beru:v1.4
      MLFLOW_BERU_TRACKING_URI: file:///app/mlruns
      # (no BERU_NIST_DIR / BERU_CROSSWALK_PATH — agent uses the bundled /app/knowledge/)
    volumes:
      # MLflow tracking output — writable, persisted on the host.
      - ./mlruns:/app/mlruns
      # Evidence ZIPs land here.
      - beru-output:/tmp/beru-api
      # HITL queue — persisted so pending findings survive a restart.
      - beru-hitl:/tmp/beru-hitl-queue
    restart: unless-stopped

  crewai:
    build:
      context: ./crew
      dockerfile: Dockerfile
    image: beru-crewai:1.0
    container_name: beru-crewai
    ports:
      - "8089:8089"
    environment:
      BERU_API_URL: "http://beru-api:8088"
      OLLAMA_BASE_URL: "http://ollama:11434"
      # Use beru:v1.4 as the crew LLM (already registered in Ollama)
      CREWAI_LLM: "ollama/beru:v1.4"
    volumes:
      # Live-reload: edit crew/ files without rebuilding the image
      - ./crew:/app
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: beru-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "admin"
      N8N_BASIC_AUTH_PASSWORD: "changeme"
      # Allows n8n to call beru-api on the internal network
      NODE_FUNCTION_ALLOW_EXTERNAL: "axios,node-fetch"
      BERU_API_URL: "http://beru-api:8088"
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped

volumes:
  ollama-models:
  beru-output:
  beru-hitl:
  n8n-data:
  crewai-cache:
